<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HJ Kim — Elevation Printing Services</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2e3149;
      border-radius: 20px;
      padding: 36px 28px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .logo-area {
      margin-bottom: 24px;
    }

    .logo-area img {
      max-width: 200px;
      width: 100%;
      height: auto;
      margin-bottom: 16px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .company {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7b8ab8;
      margin-bottom: 6px;
    }

    .name {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    .title {
      font-size: 14px;
      color: #a0aac8;
      margin-top: 4px;
    }

    .divider {
      border: none;
      border-top: 1px solid #2e3149;
      margin: 24px 0;
    }

    .qr-wrapper {
      background: #ffffff;
      border-radius: 14px;
      padding: 16px;
      display: inline-block;
      margin-bottom: 20px;
    }

    #qrcode canvas, #qrcode img {
      display: block;
    }

    .scan-label {
      font-size: 12px;
      color: #7b8ab8;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .info {
      list-style: none;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .info li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 14px;
      color: #c5cde8;
    }

    .info li .icon {
      font-size: 16px;
      width: 20px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .info li a {
      color: #c5cde8;
      text-decoration: none;
    }

    .info li a:hover {
      color: #ffffff;
    }

    .save-btn {
      display: block;
      margin-top: 28px;
      padding: 14px;
      background: #3d5afe;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .save-btn:hover {
      background: #536dfe;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-area">
      <img src="Elevation PS logo.png" alt="Elevation Printing Services" />
      <div class="name">HJ Kim</div>
      <div class="title">President</div>
    </div>

    <hr class="divider" />

    <div class="qr-wrapper">
      <div id="qrcode"></div>
    </div>
    <div class="scan-label">Scan to save contact</div>

    <ul class="info">
      <li><span class="icon">📞</span><span>848.269.0809 Ext 2</span></li>
      <li><span class="icon">✉️</span><a href="mailto:hjkim@elevationprintingservices.com">hjkim@elevationprintingservices.com</a></li>
      <li><span class="icon">🌐</span><a href="https://www.elevationprintingservices.com" target="_blank">elevationprintingservices.com</a></li>
      <li><span class="icon">📍</span><span>2709 Hamilton Blvd<br>South Plainfield, NJ 07080</span></li>
      <li><span class="icon">💼</span><a href="https://linkedin.com/in/hj-kim-b69b53261" target="_blank">linkedin.com/in/hj-kim-b69b53261</a></li>
    </ul>

    <a class="save-btn" href="HJKim.vcf" download>Save to Contacts</a>
  </div>

  <script>
    const vcard = [
      "BEGIN:VCARD",
      "VERSION:3.0",
      "N:Kim;HJ;;;",
      "FN:HJ Kim",
      "ORG:Elevation Printing Services",
      "TITLE:President",
      "TEL;TYPE=WORK,VOICE:+18482690809 ext. 2",
      "EMAIL;TYPE=WORK:hjkim@elevationprintingservices.com",
      "URL:https://www.elevationprintingservices.com",
      "ADR;TYPE=WORK:;;2709 Hamilton Blvd;South Plainfield;NJ;07080;US",
      "X-SOCIALPROFILE;type=linkedin:https://linkedin.com/in/hj-kim-b69b53261",
      "END:VCARD"
    ].join("\n");

    new QRCode(document.getElementById("qrcode"), {
      text: vcard,
      width: 220,
      height: 220,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });
  </script>
</body>
</html>
